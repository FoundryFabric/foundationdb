name: Docker

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'FDB version tag (e.g. 7.4.6)'
        required: true
        default: '7.4.6'

permissions:
  contents: read
  packages: write

jobs:
  base:
    name: Build foundationdb-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set FDB version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push foundationdb-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/foundryfabric/foundationdb-base:${{ steps.version.outputs.tag }}
            ghcr.io/foundryfabric/foundationdb-base:latest
          build-args: |
            FDB_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  server:
    name: Build foundationdb
    runs-on: ubuntu-latest
    needs: base
    steps:
      - uses: actions/checkout@v4

      - name: Set FDB version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push foundationdb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/foundryfabric/foundationdb:${{ steps.version.outputs.tag }}
            ghcr.io/foundryfabric/foundationdb:latest
          build-args: |
            FDB_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  monitor:
    name: Build fdb-kubernetes-monitor (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set FDB version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download fdb-kubernetes-monitor binary (amd64 — extract from official image)
        if: matrix.arch == 'amd64'
        run: |
          CONTAINER=$(docker create foundationdb/fdb-kubernetes-monitor:${{ steps.version.outputs.tag }})
          docker cp ${CONTAINER}:/usr/bin/fdb-kubernetes-monitor ./fdbkubernetesmonitor
          docker rm ${CONTAINER}
          chmod +x fdbkubernetesmonitor

      - name: Download fdb-kubernetes-monitor binary (arm64)
        if: matrix.arch == 'arm64'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try our FoundryFabric release first (has native arm64 binary for 7.4+).
          # Fall back to extracting from the official upstream image (works for 7.3.x
          # which already ships native ARM64 support).
          if gh release download ${{ steps.version.outputs.tag }} \
              --pattern "fdbkubernetesmonitor-linux-arm64" \
              --output fdbkubernetesmonitor 2>/dev/null; then
            echo "Using native arm64 binary from FoundryFabric release"
          else
            echo "No release binary found; extracting from official arm64 image"
            docker pull --platform linux/arm64 \
              foundationdb/fdb-kubernetes-monitor:${{ steps.version.outputs.tag }}
            CONTAINER=$(docker create --platform linux/arm64 \
              foundationdb/fdb-kubernetes-monitor:${{ steps.version.outputs.tag }})
            docker cp ${CONTAINER}:/usr/bin/fdb-kubernetes-monitor ./fdbkubernetesmonitor
            docker rm ${CONTAINER}
          fi
          chmod +x fdbkubernetesmonitor

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch-specific monitor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.monitor
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ghcr.io/foundryfabric/fdb-kubernetes-monitor:${{ steps.version.outputs.tag }}-${{ matrix.arch }}
          build-args: |
            FDB_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=monitor-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=monitor-${{ matrix.arch }}

  monitor-manifest:
    name: Monitor manifest
    runs-on: ubuntu-latest
    needs: monitor
    steps:
      - name: Set FDB version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          BASE=ghcr.io/foundryfabric/fdb-kubernetes-monitor
          docker buildx imagetools create \
            --tag ${BASE}:${VERSION} \
            --tag ${BASE}:latest \
            ${BASE}:${VERSION}-amd64 \
            ${BASE}:${VERSION}-arm64
